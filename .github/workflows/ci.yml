name: CI - Python + Next.js

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # === Python ===
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps + Lint
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt flake8 black
          flake8 . --count --exit-zero --statistics || true
          python -c 'import app, pipeline, utils; print("Python OK")'

      # === Frontend ===
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build Next.js
        run: |
          npm install
          npm run build --if-present || echo 'Build warnings ok'
          echo 'Frontend processed'

      # === Security ===
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: 'python,javascript'
      - uses: github/codeql-action/analyze@v3
