name: CI 🚀 (Python + Next.js + Security)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest

      - name: Lint & Format check
        run: |
          flake8 --count --exit-zero .
          black --check --diff . || echo "Black formatting suggestions above"

      - name: Smoke test
        run: |
          python -c "import app, pipeline, utils; print('✅ All Python modules import successfully!')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm run lint --if-present || echo 'Lint OK (warnings allowed for now)'

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # CodeQL is already in its own workflow - keeping it separate is recommended by GitHub
